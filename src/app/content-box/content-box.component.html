<!-- Parent must be position: relative and have desired height. Example usage shown afterwards. -->
<div #box class="content-box" [class.expanded]="expanded" role="region" aria-labelledby="cb-title" aria-expanded="false">
  <div class="header">
    <h3 id="cb-title" class="title">{{ title }}</h3>
  </div>

  <div class="description-wrap">
    <p #desc
      class="description"
      [class.clamped]="!expanded"
      [attr.aria-hidden]="expanded ? 'false' : 'true'">
      {{ description }}
    </p>
  </div>

  @if (showToggle) {
    <div class="actions">
      <button ion-button fill="clear" (click)="toggleExpand()" class="toggle-btn" [attr.aria-expanded]="expanded">
        {{ expanded ? 'Read less' : 'Read more' }}
      </button>
    </div>
  }
</div>
