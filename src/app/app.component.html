<ion-app>
  <ion-router-outlet [animated]="true" [animation]="fadeTransition" ></ion-router-outlet>
  <ax-notification-host></ax-notification-host>
  <!-- Force-update prompt — full-viewport blocker when shown.
       Driven by AppUpdateService.check() in app.component.ts. -->
  <ax-update-prompt
    [isOpen]="showForceUpdate"
    [title]="forceUpdateTitle"
    [message]="forceUpdateMessage"
    [versionLabel]="forceUpdateVersionLabel"
    [buttonLabel]="forceUpdateButton"
    [canDismiss]="forceUpdateCanDismiss"
    [dismissLabel]="forceUpdateLaterLabel"
    (updateClicked)="onUpdateClicked()"
    (dismissed)="onDismissed()">
  </ax-update-prompt>
</ion-app>
