<div #scrollContainer class="conversation">
<ng-container *ngFor="let m of messages">
    <div class="message-row"
      [ngClass]="{ outgoing: isOutgoing(m), incoming: !isOutgoing(m) }"
      role="article"
      aria-label="chat message" >
      <!-- avatar on left for incoming, right for outgoing -->
      <ng-container *ngIf="!isOutgoing(m)">
        <img
          *ngIf="m.senderAvatar; else initialsLeft"
          class="avatar"
          [src]="m.senderAvatar"
          alt="{{ m.senderName || 'Sender' }}"
          loading="lazy"
        />
        <ng-template #initialsLeft>
          <div
            class="avatar avatar-initials"
            [style.background]="avatarColor(m.senderName)"
            [style.color]="avatarTextColor(m.senderName)"
            aria-hidden="true"
            title="{{ m.senderName || 'Unknown' }}"
          >
            {{ initials(m.senderName) }}
          </div>
        </ng-template>
      </ng-container>

      <div class="bubble-wrap">
        <div class="bubble">
          <div class="sender" *ngIf="!isOutgoing(m)">{{ m.senderName }}</div>

          <div class="content">
            <ng-container *ngIf="m.attachment">
              <img class="attachment" [src]="m.attachment" alt="attachment" />
            </ng-container>

            <div class="text">{{ m.content }}</div>
          </div>

          <div class="meta">
            <time *ngIf="showTimestamps">{{ m.createdAt | date:'shortTime' }}</time>
            <span class="status" *ngIf="isOutgoing(m) && m.status"> • {{ m.status }}</span>
          </div>
        </div>
      </div>

      <!-- avatar for outgoing users (on right) -->
      <ng-container *ngIf="isOutgoing(m)">
        <img
          *ngIf="m.senderAvatar; else initialsRight"
          class="avatar"
          [src]="m.senderAvatar"
          alt="{{ m.senderName || 'You' }}"
          loading="lazy"
        />
        <ng-template #initialsRight>
          <div
            class="avatar avatar-initials"
            [style.background]="avatarColor(m.senderName)"
            [style.color]="avatarTextColor(m.senderName)"
            aria-hidden="true"
            title="{{ m.senderName || 'You' }}"
          >
            {{ initials(m.senderName) }}
          </div>
        </ng-template>
      </ng-container>
    </div>
  </ng-container>
</div>
