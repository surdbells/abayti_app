    </section>

    <span class="ion-text-center ion-padding-vertical ion-margin-vertical">
      @if (ui_controls.is_loading){
        <tui-loader></tui-loader>
      }
    </span>
    <div *ngIf="ui_controls.is_empty && !ui_controls.is_loading" class="empty-state">
      <ion-card>
        <ion-card-content class="ion-text-center">
          <tui-icon [style.font-size.rem]="2" icon="heart"></tui-icon>
          <h2>No items in your wishlist</h2>
        </ion-card-content>
      </ion-card>
    </div>

  </div>
  <ion-modal  #wishlistModal trigger="add_wish_list" [initialBreakpoint]="0.5" [breakpoints]="[0, 0.3, 0.5, 0.8, 1]">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Add wish list category</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="wishlistModal.dismiss()">Close</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-row class="animate__animated ion-padding-bottom">
          <ion-col *ngIf="!ui_controls.is_creating" >
            <tui-textfield class="animate__animated animate__fadeInDown"  #m tuiTextfieldSize="m" style="width:100%">
              <label tuiLabel>Category name</label>
              <input [maxlength]="25" [(ngModel)]="add_label.label_name" type="text" name="name" tuiTextfield />
            </tui-textfield>
          </ion-col>
          <button *ngIf="!ui_controls.is_creating" (click)="add_wishlist_label()" appearance="outline" tuiAppearanceMode="checked" class="ion-margin-vertical animate__animated animate__fadeInDown abayti_primary_background ion-color-light"
                  style="width: 100%; outline-color: #000000; color: #000000" size="m"
                  tuiButton type="button"> Add
          </button>
        </ion-row>
        <ion-row>
          <ion-col>
            <tui-loader *ngIf="ui_controls.is_creating"></tui-loader>
          </ion-col>
        </ion-row>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
