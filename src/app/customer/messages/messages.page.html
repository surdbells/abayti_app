  @if (!ui_controls.is_loading){
  <div class="sheet ion-padding-horizontal">
    @for(store of stores; track $index){
      <ion-list class="contact-list">
        <ion-item (click)="conversations(store.store,store.store_name)" class="animate__animated animate__fadeInDown" detail="false">
          <ion-label>
            <ion-text> <strong>{{ store.store_name }}</strong></ion-text><br />
            <ion-note color="medium" class="ion-text-wrap">
              {{ store.store_address }}
            </ion-note>
          </ion-label>
          <ion-chip class="online_status" slot="end">
            <ion-label style="color: #ffffff">{{ store.total_products }}</ion-label>
          </ion-chip>
        </ion-item>
      </ion-list>
    }
  </div>
  }
  <span class="ion-text-center ion-padding-vertical ion-margin-vertical">
      @if (ui_controls.is_loading){
        <tui-loader></tui-loader>
      }
   </span>
</ion-content>
<ion-footer style="background-color: #7C2108; padding-bottom: 15px;" class="ion-no-border">
  <ion-tab-bar style="background-color: #7C2108; padding-top: 2px; padding-bottom: 2px" slot="bottom">
    <ion-tab-button (click)="user_home()" tab="home">
      <ax-icon name="house" [style.color]="'var(--ion-color-secondary-contrast)'"/>
      <ion-label style="text-decoration: underline" [style.color]="'var(--ion-color-secondary-contrast)'">Home</ion-label>
    </ion-tab-button>
    <ion-tab-button (click)="user_explore()" tab="explore">
      <ax-icon name="globe" [style.color]="'var(--ion-color-secondary-contrast)'"/>
      <ion-label [style.color]="'var(--ion-color-secondary-contrast)'">Explore</ion-label>
    </ion-tab-button>
    <ion-tab-button (click)="user_cart()" tab="explore">
      <ax-icon name="shopping-cart" [style.color]="'var(--ion-color-secondary-contrast)'"/>
      <ion-label [style.color]="'var(--ion-color-secondary-contrast)'">My Cart</ion-label>
    </ion-tab-button>
    <ion-tab-button (click)="user_styles()" tab="sketch">
      <ax-icon name="blocks" [style.color]="'var(--ion-color-secondary-contrast)'"/>
      <ion-label [style.color]="'var(--ion-color-secondary-contrast)'">Style hub</ion-label>
    </ion-tab-button>
    <ion-tab-button (click)="user_profile()" tab="profile">
      <ax-icon name="user-pen" [style.color]="'var(--ion-color-secondary-contrast)'"/>
      <ion-label [style.color]="'var(--ion-color-secondary-contrast)'">Profile</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-footer>
