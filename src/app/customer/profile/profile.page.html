
<ion-content class="ion-padding remove_nudge">
  <div class="sheet">
    <ion-buttons class="back-chip" [routerLink]="['/account']" aria-label="Back to account" slot="start">
      <tui-icon icon="@tui.chevron-left" />
      <span>Profile</span>
    </ion-buttons>
    <!-- Header -->
    <div class="sheet-header">
      <div class="avatar">
        <ion-img src="{{single_user.avatar}}" alt="{{single_user.first_name}}"></ion-img>
      </div>
      <div class="welcome">
        <div class="overline">WELCOME</div>
        <h1 class="name">{{ single_user.first_name}}</h1>
      </div>
    </div>

    <!-- Stats -->
    <!--<div class="stats">
      <div class="stat-pill">
        <div class="stat-label">Points</div>
        <div class="stat-value">
          {{ user().points | number:'1.0-0' }}
          <span class="unit">PTS</span>
        </div>
      </div>
      <div class="stat-pill">
        <div class="stat-label">Rewards</div>
        <div class="stat-value">
          {{ user().pending | number:'1.0-0' }}
          <span class="unit">PTS</span>
        </div>
      </div>
    </div>-->

    <!-- Menu list -->
    <div class="menu">

      <button type="button" class="menu-item animate__animated animate__fadeInDown" (click)="openReturns()">
        <div class="left">
          <tui-icon icon="@tui.undo-2" [style.color]="'var(--text)'" />
          <span>Returns</span>
        </div>
        <tui-icon icon="@tui.chevron-right" />
      </button>

      <!--      <button type="button" class="menu-item animate__animated animate__fadeInDown" (click)="openWallet()">
        <div class="left">
          <tui-icon icon="@tui.wallet" [style.color]="'var(&#45;&#45;text)'" />
          <span>My Wallet</span>
        </div>
        <tui-icon icon="@tui.chevron-right" />
      </button>

      <button type="button" class="menu-item animate__animated animate__fadeInDown" (click)="openCards()">
        <div class="left">
          <tui-icon icon="@tui.credit-card" [style.color]="'var(&#45;&#45;text)'" />
          <span>My Payment Cards</span>
        </div>
        <tui-icon icon="@tui.chevron-right" />
      </button>-->

      <button type="button" class="menu-item animate__animated animate__fadeInDown" (click)="openReviews()">
        <div class="left">
          <tui-icon icon="@tui.star" [style.color]="'var(--text)'" />
          <span>My Reviews</span>
        </div>
        <tui-icon icon="@tui.chevron-right" />
      </button>

      <button type="button" class="menu-item animate__animated animate__fadeInDown" (click)="openAddresses()">
        <div class="left">
          <tui-icon icon="@tui.map-pin" [style.color]="'var(--text)'" />
          <span>Delivery Addresses</span>
        </div>
        <tui-icon icon="@tui.chevron-right" />
      </button>

      <button type="button" class="menu-item animate__animated animate__fadeInDown" (click)="openMeasurement()">
        <div class="left">
          <tui-icon icon="@tui.ruler" [style.color]="'var(--text)'" />
          <span>Measurements</span>
        </div>
        <tui-icon icon="@tui.chevron-right" />
      </button>
    </div>

    <!-- Language -->
    <div class="group-title">LANGUAGE</div>
    <app-language-switcher></app-language-switcher>

    <!-- Location -->
    <div class="group-title">LOCATION</div>
    <button  id="open-location" type="button" class="menu-item animate__animated animate__fadeInDown">
      <div class="left">
        <span>{{ single_user.location }}</span>
      </div>
      <tui-icon icon="@tui.chevron-right" />
    </button>

    <!-- Footer actions -->
    <div class="footer-row ion-margin-bottom">
      <button type="button" class="support" (click)="openHelp()">
        <tui-icon icon="@tui.help-circle" />
        <span>Support</span>
      </button>

      <button type="button" class="signout" (click)="signOut()">
        SIGN OUT
      </button>
    </div>
  </div>

  <ion-modal  #locationModal trigger="open-location" [initialBreakpoint]="0.3" [breakpoints]="[0, 0.3, 0.5, 0.8, 1]">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Set location</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="locationModal.dismiss()">Close</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-row class="animate__animated ion-padding-bottom">
          <ion-col>
            <tui-textfield class="animate__animated animate__fadeInDown"  #m tuiTextfieldSize="m" style="width:100%">
              <label tuiLabel>Location</label>
              <input [(ngModel)]="u_location.location" type="text" name="name" tuiTextfield />
            </tui-textfield>
          </ion-col>
          <button *ngIf="!ui_controls.updating_location" (click)="update_location()" appearance="outline" tuiAppearanceMode="checked" class="ion-margin-vertical animate__animated animate__fadeInDown abayti_primary_background ion-color-light"
                  style="width: 100%; outline-color: #ffffff; color: #ffffff" size="m"
                  tuiButton type="button"> Update
          </button>
          </ion-row>
        <ion-row>
          <ion-col>
            <tui-loader *ngIf="ui_controls.updating_location"></tui-loader>
          </ion-col>
        </ion-row>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
