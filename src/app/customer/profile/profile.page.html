<ion-header style="background-color: #664840" class="ion-padding-top" translucent="true">
  <ion-toolbar class="toolbar  ion-no-border ion-padding-top">
    <ion-buttons class="back-chip" [routerLink]="['/account']" aria-label="Back to account" slot="start">
      <tui-icon icon="@tui.chevron-left" />
      <span>Profile</span>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content [fullscreen]="true" class="profile-bg">
  <!-- HERO -->
  <div class="hero ion-margin-horizontal">
    <div class="hero-top">
      <div class="welcome">
        <div class="name">{{ single_user.first_name }}</div>
      </div>

      <ion-avatar class="avatar">
        <ion-img src="https://lh3.googleusercontent.com/ogw/AF2bZyj-sYY2-U51it1lAO4EoJhdrpH58igEC5Rohx0On76Vn5Xl=s32-c-mo" alt="User avatar"></ion-img>
      </ion-avatar>
    </div>
    <div class="points-row">
      <div class="pill">
        <span class="label">POINTS</span>
        <span class="value">{{ user().points | number:'1.0-2' }} PTS</span>
      </div>
      <div class="pill">
        <span class="label">Pending Points</span>
        <span class="value">{{ user().pending | number:'1.0-0' }} PTS</span>
      </div>
    </div>
  </div>

  <!-- MY ACCOUNT -->
  <section class="section">
    <div class="section-title">MY ACCOUNT</div>
    <ion-list class="list-flat">
      <ion-item button detail (click)="openReturns()">
        <tui-icon slot="start" icon="@tui.rotate-ccw" [style.color]="'var(--text)'" />
        <ion-label>Returns</ion-label>
        <tui-icon slot="end" icon="@tui.chevron-right" />
      </ion-item>

<!--      <ion-item button detail (click)="openWallet()">
        <tui-icon slot="start" icon="@tui.wallet" [style.color]="'var(&#45;&#45;text)'" />
        <ion-label>My Wallet</ion-label>
        <tui-icon slot="end" icon="@tui.chevron-right" />
      </ion-item>

      <ion-item button detail (click)="openCards()">
        <tui-icon slot="start" icon="@tui.credit-card" [style.color]="'var(&#45;&#45;text)'" />
        <ion-label>My Payment Cards</ion-label>
        <tui-icon slot="end" icon="@tui.chevron-right" />
      </ion-item>-->

      <ion-item button detail (click)="openInfo()">
        <tui-icon slot="start" icon="@tui.user" [style.color]="'var(--text)'" />
        <ion-label>My Information</ion-label>
        <tui-icon slot="end" icon="@tui.chevron-right" />
      </ion-item>

      <ion-item button detail (click)="openReviews()">
        <tui-icon slot="start" icon="@tui.star" [style.color]="'var(--text)'" />
        <ion-label>My Reviews</ion-label>
        <tui-icon slot="end" icon="@tui.chevron-right" />
      </ion-item>
    </ion-list>
  </section>

  <section class="section">
    <div class="section-title">MY LANGUAGE</div>
    <app-language-switcher></app-language-switcher>
